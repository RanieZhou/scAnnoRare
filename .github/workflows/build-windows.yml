name: Build Windows Installer

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to upload asset to (e.g. v1.6.0)"
        required: true

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Set up Python 3.11
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.11"

      - name: Set up Node.js 22
        uses: actions/setup-node@v4.4.0
        with:
          node-version: "22"

      - name: Set up Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: actions/cache@v4.2.3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            desktop-agent/src-tauri/target
          key: windows-cargo-${{ hashFiles('desktop-agent/src-tauri/Cargo.lock') }}
          restore-keys: windows-cargo-

      - name: Install WebView2 (ensure runtime is present)
        run: |
          # WebView2 is pre-installed on windows-latest; this is a no-op safety check.
          Write-Host "WebView2 runtime check: OK"

      - name: Install Python dependencies + PyInstaller
        run: |
          [Console]::OutputEncoding = [System.Text.Encoding]::UTF8
          $OutputEncoding = [System.Text.Encoding]::UTF8
          chcp 65001 | Out-Null
          cd local-agent
          python -m pip install --upgrade pip --quiet
          python -m pip install -r requirements.txt --quiet
          python -m pip install pyinstaller --quiet

      - name: Package Local Agent with PyInstaller
        run: |
          [Console]::OutputEncoding = [System.Text.Encoding]::UTF8
          $OutputEncoding = [System.Text.Encoding]::UTF8
          chcp 65001 | Out-Null
          cd local-agent/packaging
          Remove-Item -Recurse -Force .\dist\scannorare-agent -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force .\build -ErrorAction SilentlyContinue
          pyinstaller agent.spec --distpath .\dist --workpath .\build --noconfirm
          if (-not (Test-Path ".\dist\scannorare-agent\scannorare-agent.exe")) {
            Write-Error "Agent build failed: scannorare-agent.exe not found"
            exit 1
          }
          Write-Host "Agent built successfully."

      - name: Install desktop shell dependencies
        run: |
          cd desktop-agent
          npm install

      - name: Build Tauri Windows installer
        run: |
          cd desktop-agent
          npm run tauri build
        env:
          # Disable code signing for CI builds
          TAURI_SIGNING_PRIVATE_KEY: ""

      - name: Locate installer files
        id: find_installers
        run: |
          $msi = Get-ChildItem "desktop-agent/src-tauri/target/release/bundle/msi/*.msi" | Select-Object -First 1
          $exe = Get-ChildItem "desktop-agent/src-tauri/target/release/bundle/nsis/*.exe" | Select-Object -First 1
          echo "msi_path=$($msi.FullName)" >> $env:GITHUB_OUTPUT
          echo "exe_path=$($exe.FullName)" >> $env:GITHUB_OUTPUT
          echo "msi_name=$($msi.Name)" >> $env:GITHUB_OUTPUT
          echo "exe_name=$($exe.Name)" >> $env:GITHUB_OUTPUT
          Write-Host "MSI: $($msi.FullName)"
          Write-Host "EXE: $($exe.FullName)"

      - name: Upload installers to GitHub Release
        uses: softprops/action-gh-release@v2.3.2
        with:
          tag_name: ${{ github.event.release.tag_name || inputs.tag }}
          files: |
            ${{ steps.find_installers.outputs.msi_path }}
            ${{ steps.find_installers.outputs.exe_path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
